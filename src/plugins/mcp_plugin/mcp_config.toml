[amap-maps]
enable = true
desc = "高德地图MCP Server现已覆盖15大核心接口，提供全场景覆盖的地理信息服务，包括生成专属地图、导航到目的地、打车、地理编码、逆地理编码、IP定位、天气查询、骑行路径规划、步行路径规划、驾车路径规划、公交路径规划、距离测量、关键词搜索、周边搜索、详情搜索等。"
url = "https://mcp.amap.com/mcp?key=xxx"

[z-image]
enable = true
desc = "Z-Image-Turbo是在Artificial Analysis评测中荣登文生图开源模型世界第一的高效图像生成模型,仅用60亿参数和8步推理就能生成媲美大规模商业模型的照片级真实感图像,并在中英双语文本渲染、复杂语义理解和多样化主题生成上表现卓越。"
url = "https://dashscope.aliyuncs.com/api/v1/mcps/zimage/mcp"
[z-image.headers]
Authorization = "Bearer ${DASHSCOPE_API_KEY}"

[market-cmapi033617]
enable = true
desc = "天气预报查询是万维易源提供的一个通过输入坐标、IP、地名、区号/邮编、景点名称，查询天气情况（天气状况包括：湿度、天气图标、当前温度、风向、风级、紫外线、穿衣指南、空气指数）等信息。可查询到当前天气、未来24小时、7天、15天、40天内天气预报和过往的历史天气情况，通过 MCP 工具获取所需服务。"
url = "https://dashscope.aliyuncs.com/api/v1/mcps/market-cmapi033617/mcp"
[market-cmapi033617.headers]
Authorization = "Bearer ${DASHSCOPE_API_KEY}"

[mcd-mcp]
enable = true
desc = "麦当劳点餐工具"
url = "https://mcp.mcd.cn"
[mcd-mcp.headers]
Authorization = "Bearer ${MCD_KEY}"

[WebSearch]
enable = true
desc = "联网搜索，获取实时信息"
url = "https://dashscope.aliyuncs.com/api/v1/mcps/WebSearch/mcp"
[WebSearch.headers]
Authorization = "Bearer ${DASHSCOPE_API_KEY}"